# Tech Stack Extraction: lttr/chrono-albums-2
# Source: https://github.com/lttr/chrono-albums-2
# Extracted: 2026-03-04

project:
  name: Chrono Albums 2
  description: "Self-hosted photo album platform for organizing and sharing memories chronologically"
  repository: https://github.com/lttr/chrono-albums-2
  license: MIT

# ==============================================================================
# RUNTIME
# ==============================================================================

runtime:
  node:
    version: "24.13.0"  # from .node-version
    nixpacks_version: "22"  # from nixpacks.toml
  package_manager:
    name: pnpm
    version: "10.17.1"  # from packageManager field

# ==============================================================================
# FRAMEWORK
# ==============================================================================

framework:
  name: Nuxt
  version: "^4.2.2"
  features:
    - typed-pages (experimental)
    - typescript-plugin (experimental)
    - devtools
    - hidden-source-maps in production

  modules:
    - name: "@nuxthub/core"
      version: "^0.10.1"
      purpose: "Backend services (blob storage, database, scheduled tasks)"
    - name: "@nuxt/eslint"
      version: "^1.12.1"
      purpose: "ESLint integration"
    - name: "@nuxt/fonts"
      version: "^0.12.1"
      purpose: "Font management"
    - name: "@nuxt/icon"
      version: "^2.1.0"
      purpose: "Icon components"
    - name: "@nuxt/image"
      version: "^2.0.0"
      purpose: "Image optimization"
    - name: "@nuxtjs/color-mode"
      version: "^4.0.0"
      purpose: "Dark/light theme switching (system preference with light fallback)"
    - name: "@nuxtjs/plausible"
      version: "^2.0.1"
      purpose: "Privacy-friendly analytics (custom domain, ignores localhost)"
    - name: "@nuxtjs/seo"
      version: "^3.2.2"
      purpose: "SEO utilities (indexing disabled)"
    - name: "@lttr/nuxt-puleo"
      version: "^0.0.8"
      purpose: "Custom CSS framework integration"
    - name: "@vueuse/nuxt"
      version: "^14.1.0"
      purpose: "VueUse composables for Nuxt"
    - name: "@sentry/nuxt"
      version: "^10.32.1"
      purpose: "Error tracking and monitoring"

# ==============================================================================
# FRONTEND
# ==============================================================================

frontend:
  framework:
    name: Vue
    version: "latest"  # as specified in package.json

  ui:
    css_framework:
      name: "@lttr/puleo"
      version: "^0.8.1"
      description: "Custom CSS framework by the author"
    icons:
      name: "@iconify-json/uil"
      version: "^1.2.3"
      description: "Unicons icon set via Iconify"

  gallery:
    - name: photoswipe
      version: "^5.4.4"
      purpose: "Lightbox gallery for photo viewing"
    - name: justified-layout
      version: "^4.1.0"
      purpose: "Flickr-style justified grid layout"

  composables:
    - name: "@vueuse/core"
      version: "^14.1.0"

  media_client:
    - name: heic2any
      version: "^0.0.4"
      purpose: "iPhone HEIC to JPEG conversion in browser"
    - name: compressorjs
      version: "^1.2.1"
      purpose: "Client-side image compression before upload"

  routing:
    - name: unplugin-vue-router
      version: "^0.19.0"
      purpose: "File-based typed routing"

# ==============================================================================
# BACKEND
# ==============================================================================

backend:
  server:
    name: Nitro
    description: "Nuxt's server engine — API handlers, scheduled tasks"
    scheduled_tasks:
      - "Job recovery and cleanup (runs every minute)"

  database:
    engine: SQLite
    client:
      name: "@libsql/client"
      version: "^0.15.15"
      description: "LibSQL client (SQLite-compatible)"
    orm:
      name: drizzle-orm
      version: "^0.45.1"
    schema_validation:
      name: drizzle-zod
      version: "^0.8.3"
    tooling:
      name: drizzle-kit
      version: "^0.31.8"
      purpose: "Schema migrations and generation"
    seeding:
      name: drizzle-seed
      version: "^0.3.1"

  blob_storage:
    name: NuxtHub Blob Storage
    description: "Media file storage via @nuxthub/core"

  authentication:
    name: better-auth
    version: "^1.4.7"
    provider: Google OAuth
    features:
      - session management
      - invitation-based project access
      - role-based access (owner, editor, viewer)
    mock_auth: "NUXT_PUBLIC_MOCK_AUTH=true for development without Google OAuth"

  validation:
    - name: zod
      version: "4.1.13"
    - name: "@zod/core"
      version: "^0.11.6"

  media_processing:
    - name: sharp
      version: "^0.34.5"
      purpose: "Server-side image manipulation"
    - name: fluent-ffmpeg
      version: "^2.1.3"
      purpose: "Video thumbnail generation and metadata extraction"
    - name: ffmpeg-static
      version: "^5.3.0"
      purpose: "Bundled FFmpeg binary"
    - name: ffprobe-static
      version: "^3.1.0"
      purpose: "Bundled FFprobe binary"
    - name: exifreader
      version: "^4.33.1"
      purpose: "EXIF metadata extraction from photos"

  utilities:
    - name: date-fns
      version: "^4.1.0"
      purpose: "Date manipulation and formatting"

# ==============================================================================
# DEVELOPMENT TOOLING
# ==============================================================================

development:
  language:
    name: TypeScript
    version: "^5.9.3"
    type_checking:
      - vue-tsc: "^3.1.8"
      - "@total-typescript/ts-reset": "^0.6.1"
    scripts:
      - "nuxi typecheck"

  testing:
    framework:
      name: vitest
      version: "^4.0.15"
      environment: nuxt
    dom:
      name: happy-dom
      version: "^20.0.11"
    utilities:
      - name: "@nuxt/test-utils"
        version: "^3.21.0"
      - name: "@vue/test-utils"
        version: "^2.4.6"

  linting:
    name: eslint
    version: "^9.39.1"
    config: "@lttr/nuxt-config-eslint"
    plugins:
      - name: eslint-plugin-import-x
        version: "^4.16.1"
        purpose: "Enforce declared dependencies (no-extraneous-dependencies)"

  formatting:
    name: prettier
    version: "^3.7.4"

  scripting:
    - name: tsx
      version: "^4.21.0"
      purpose: "TypeScript execution for scripts (e.g., db:seed)"

  monitoring:
    name: Sentry
    packages:
      - "@sentry/nuxt": "^10.32.1"
    config_files:
      - sentry.client.config.ts
      - sentry.server.config.ts

  analytics:
    name: Plausible
    package: "@nuxtjs/plausible"
    description: "Privacy-friendly analytics on custom domain"

# ==============================================================================
# DEPLOYMENT
# ==============================================================================

deployment:
  platform:
    name: Coolify
    description: "Self-hosted PaaS on VPS"
  build:
    tool: nixpacks
    config: nixpacks.toml
    provider: node
  start_command: "pnpm exec nuxt db migrate && node .output/server/index.mjs"
  site_url: "https://chrono-albums.lttr.cz"
  locale: cs  # Czech

# ==============================================================================
# PROJECT STRUCTURE
# ==============================================================================

structure:
  directories:
    - path: app/
      purpose: "Nuxt app directory (pages, components, composables, layouts)"
    - path: server/
      purpose: "Nitro server (API routes, middleware, database, tasks)"
    - path: shared/
      purpose: "Code shared between app and server"
    - path: layers/auth/
      purpose: "Authentication layer (Nuxt layer)"
    - path: public/
      purpose: "Static assets"
    - path: scripts/
      purpose: "Utility scripts (e.g., database seeding)"
    - path: tests/
      purpose: "Test files"
    - path: fixtures/images/
      purpose: "Test fixture images"
    - path: docs/
      purpose: "Documentation"
    - path: .aiwork/
      purpose: "AI work artifacts"

  config_files:
    - nuxt.config.ts
    - tsconfig.json
    - vitest.config.ts
    - eslint.config.js
    - nixpacks.toml
    - sentry.client.config.ts
    - sentry.server.config.ts
    - .prettierrc
    - .prettierignore
    - .env.example
    - .node-version
    - .npmrc
    - reset.d.ts
    - pnpm-workspace.yaml

# ==============================================================================
# NPM SCRIPTS
# ==============================================================================

scripts:
  dev: "nuxt dev"
  build: "nuxt build"
  start: "node .output/server/index.mjs"
  preview: "nuxt preview"
  test: "vitest run"
  typecheck: "nuxi typecheck"
  lint: "eslint"
  lint_fix: "eslint --fix"
  format: "prettier --list-different --write ."
  verify: "npm run format && npm run lint:fix && npm run typecheck && npm test"
  db_generate: "npx nuxt db generate"
  db_migrate: "npx nuxt db migrate"
  db_reset: "rm -f .data/db/sqlite.db && npx nuxt db migrate && npm run db:seed"
  db_seed: "npx tsx scripts/seed.ts"
  db_studio: "npx nuxt dev --devtools"
