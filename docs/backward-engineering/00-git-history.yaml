# -----------------------------------------------------------------------------
# Deleted or replaced features
# -----------------------------------------------------------------------------
deleted_or_replaced:

  - description: "InstallModule -- first-time setup wizard for creating admin account, setting web properties, and uploading header images"
    removed_in: "689c092"
    reason: "Docker-based setup made the installation wizard unnecessary; initial data is now handled by SQL seed scripts."
    relevance: "Not needed in a rewrite. Setup can be handled by database seeds or a simpler first-run script."

  - description: "EntityManager and DatabaseHelper -- abstraction layer over Nette Database (Table, TableColumn, TableRow classes)"
    removed_in: "1c5d12d"
    reason: "Over-engineered abstraction; Nette Database API was sufficient. Models now extend BaseManager directly."
    relevance: "Confirms the rewrite should use direct ORM/database calls rather than a custom abstraction."

  - description: "ResourceManager -- shared parent class for ArticleManager and NewsManager"
    removed_in: "c806fda (renamed), then 1c5d12d (removed)"
    reason: "The generic ResourceManager was renamed to EntityManager, then removed entirely as the abstraction provided no real benefit."
    relevance: "Article and News managers are sufficiently different to not need a shared base beyond BaseManager."

  - description: "ParentsManager -- management of parent/guardian contact information and mailing lists"
    removed_in: "11b0d37 through 1b96c09 (5 revert commits)"
    reason: "Feature was started (DB table, model, renaming to MailingManager) but completely reverted. No commit message explains why."
    relevance: "The ACL definitions for scout/leader roles and parents resource still exist in AuthorizatorManager. Confirm with stakeholder whether parent management should be part of the rewrite."

  - description: "Vagrant development environment (Vagrantfile, provision.sh, setup.sh)"
    removed_in: "1034a9a, 75712f1, cf44c24"
    reason: "Docker replaced Vagrant as the local development environment."
    relevance: "Not needed in rewrite; use Docker or equivalent."

  - description: "Bower frontend package manager (bower.json)"
    removed_in: "5bc6e44"
    reason: "Bower deprecated; npm used instead for frontend dependencies."
    relevance: "Rewrite should use npm/yarn/pnpm."

  - description: "Bootstrap 3 CSS framework and Sass build pipeline (scss/ directory, style.css, Bootstrap JS/fonts)"
    removed_in: "8540084, 41c33be, 9a5f995"
    reason: "Replaced by Skaut Design (Bulma-based) CSS framework matching the Czech Scout Organization's design system."
    relevance: "Rewrite should use Skaut Design or its successor."

  - description: "TinyMCE rich-text editor"
    removed_in: "86523fe"
    reason: "Replaced by CKEditor 4."
    relevance: "Rewrite should include a WYSIWYG editor; CKEditor or equivalent."

  - description: "CKEditor 5 (attempted upgrade)"
    removed_in: "e9c5018 (reverted)"
    reason: "CKEditor 5 integration did not work satisfactorily; reverted to CKEditor 4."
    relevance: "Consider whether to use CKEditor 5 (now more mature) or an alternative in the rewrite."

  - description: "Uppy file upload library"
    removed_in: "Not merged (stayed on uppy branch)"
    reason: "Experimental integration on a feature branch; never reached master."
    relevance: "The final solution uses Nette's native multi-upload form. Rewrite may consider a modern upload library."

  - description: "Custom calendar.js for events display"
    removed_in: "993a4dc"
    reason: "Replaced by the skaut-google-events-table web component."
    relevance: "Events page uses a web component; rewrite should integrate similarly with Google Calendar."

  - description: "Old logo images (www/images/ directory with PDF and PNG logo variants)"
    removed_in: "09505b4"
    reason: "Replaced by logo24.svg and moved to www/img/ directory structure."
    relevance: "Use SVG logo in rewrite."

  - description: "Individual error templates (403.latte, 404.latte, 405.latte, 410.latte, etc.)"
    removed_in: "71f506c"
    reason: "Replaced by a single error page approach using the 'chyba' (error) article in the CMS."
    relevance: "Error handling is done via a special article with url='chyba'. Rewrite should have a configurable error page."

  - description: "Packed Adminer (adminer/index.php, adminer.css)"
    removed_in: "9fb65f0, 36e9157"
    reason: "Replaced by the adminer Docker container in docker-compose.yml."
    relevance: "Database administration handled via Docker service; not part of the application."

  - description: "Contributte live-form-validation JS"
    removed_in: "Implicitly replaced during Skaut Design migration"
    reason: "Bootstrap 3 form validator was replaced; standard Nette Forms JS validation used instead."
    relevance: "Use standard form validation in rewrite."

  - description: "project.json (web name config file)"
    removed_in: "af1cd42"
    reason: "Web name moved from a JSON file to the database parameters table."
    relevance: "Confirms that site settings should be stored in the database."

  - description: "User list template (CoreModule/templates/User/list.latte)"
    removed_in: "eb806e1"
    reason: "User listing moved to admin module (Admin UserPresenter management page)."
    relevance: "User management is admin-only in the current design."

  - description: "Shared editor/list templates (@editor.latte, @list.latte, @pagedList.latte)"
    removed_in: "3e45b71"
    reason: "Generic shared templates replaced by specific templates per entity."
    relevance: "Each entity has its own templates in the current codebase."

  - description: "News default template (CoreModule/templates/News/default.latte)"
    removed_in: "4510854"
    reason: "News display consolidated to pagedList; the single-news default view was removed."
    relevance: "News items are only viewed in list form; there is no single-news detail page."

# -----------------------------------------------------------------------------
# Evolution notes
# -----------------------------------------------------------------------------
evolution_notes:
  - >
    The Čtyřiadvacítka CMS was created in December 2016 by Matyáš Kroupa
    (krouma) as a website for the 24th Scout Troop in Hradec Králové. It
    started as a basic Nette 2.x application with article and news management,
    developed across parallel html/css and php branches that were periodically
    merged.

  - >
    The early development (Dec 2016 - Feb 2017) was intense, with 18 version
    tags released in just over two months (v0.0.1 through v0.6.3). This period
    established all core features: authentication, user management, article
    CRUD, news CRUD, admin module, ACL-based authorization, and Bootstrap 3
    styling. After v0.6.3, no more tags were created.

  - >
    In 2017, several infrastructure decisions were made: Vagrant was dropped
    in favor of Docker, Bower was replaced by npm, and the InstallModule
    wizard was removed. A parents/mailing-list feature was attempted and
    immediately reverted (the 5 revert commits suggest it was a false start).

  - >
    In 2018, a major modernization occurred: upgrade to Nette 3.0, PHP 7.2+,
    strict types added to all PHP files, and the intermediate EntityManager
    abstraction layer was removed in favor of direct BaseManager inheritance.
    Form factories were extracted into individual classes.

  - >
    In 2019, Lukas Trumm joined as a significant contributor, driving the
    visual overhaul: Bootstrap 3 + Sass was completely replaced by Skaut Design
    (a Bulma-based CSS framework from the Czech Scout organization). New pages
    were added: events (Google Calendar), photos (chrono-albums gallery), and
    a redesigned contact page. The SkautDesignFormRenderer was created.
    An attempted CKEditor 5 upgrade was reverted.

  - >
    In 2019-2020, file upload capabilities were finalized with the
    ImageUploadFormFactory hierarchy (base + ArticleImages + HeaderImages).
    The Uppy experiment on a feature branch was abandoned in favor of Nette's
    native multi-upload forms. Article attachment uploads were stored in
    year-based subdirectories under www/prilohy/.

  - >
    From 2020 onward, the project entered maintenance mode with only
    occasional changes: contact page text updates, pagination bug fixes,
    analytics (Plausible) integration, and FTP deployment support.

  - >
    In 2025 (most recent commits), Kubernetes manifests were added targeting
    the pa200hw2.hailstone.cz hostname, along with a standalone Dockerfile
    for production builds. This represents the most recent infrastructure
    evolution -- from Docker Compose (development) to Kubernetes (production).

  - >
    The project has three unmerged feature branches (ckeditor, file-browser,
    uppy) representing abandoned experiments with file/image upload integrations.
    The img-form branch appears to have no unique commits. All of these can be
    safely ignored in a rewrite.

  - >
    Two contributors account for all 410 commits: Matyáš Kroupa (primary
    developer, infrastructure, core CMS) and Lukas Trumm (UI/UX, Skaut Design,
    photo gallery, events, analytics, FTP deployment). The 'krouma' author
    name in early commits is the same person as 'Matyáš Kroupa'.
