# 2. Route Connections
# Every route mapped to form + view + operation
# -----------------------------------------------------------------------------
route_connections:

  - route: "/"
    form: null
    view: "core.news.pagedList"
    operations: ["news.getCount", "news.getLimited"]
    status: complete

  - route: "/administrace"
    form: "webPropertiesForm (web_properties)"
    view: "admin.web.default"
    operations: ["project.getParameter", "admin.web.saveProperties"]
    status: complete

  - route: "/administrace/redaktor"
    form: null
    view: "admin.web.view"
    operations: []
    status: "complete (static page, no operations needed)"

  - route: "/administrace/obrazky-zahlavi"
