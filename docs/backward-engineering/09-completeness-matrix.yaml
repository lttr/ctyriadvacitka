# -----------------------------------------------------------------------------
# 4. Permission Enforcement
# Every permission mapped to the routes that enforce it
# -----------------------------------------------------------------------------
permission_enforcement:

  - role: guest
    resource: article
    action: view
    enforced_at:
      - "/<url> -- public article view, no auth required"
      - "/clanky[/<page>] -- public article list, no auth required"
    status: "covered (implicitly; these routes are public)"

  - role: guest
    resource: user
    action: view
    enforced_at:
      - "/profil/[<username>] -- public user profile, no auth required"
    status: "covered (implicitly; route is public)"

  - role: editor
    resource: article
    action: add
    enforced_at:
      - "/administrace/clanky/editor[/<url>] -- editorPermissionsRequired in startup"
      - "/clanky/seznam -- editorPermissionsRequired in startup"
    status: covered

  - role: leader
    resource: parents
    action: show
    enforced_at: []
    status: "note -- permission defined in ACL but no route enforces it; the parents feature was reverted (see git history)"

  - role: leader
    resource: parents
    action: edit
    enforced_at: []
    status: "note -- permission defined in ACL but no route enforces it; parents feature reverted"

  - role: leader
    resource: parents
    action: sendMail
    enforced_at: []
    status: "note -- permission defined in ACL but no route enforces it; parents feature reverted"

  - role: admin
    resource: article
    action: edit
    enforced_at:
      - "/administrace/clanky/editor[/<url>] -- admin can edit any article"
      - "/clanky/seznam -- admin sees all articles including non-requestable"
      - "/administrace/clanky/odstranit/<url> -- editorPermissionsRequired (admin inherits)"
    status: covered

  - role: admin
    resource: web
    action: edit
    enforced_at:
      - "/administrace -- adminPermissionsRequired in startup"
      - "/administrace/obrazky-zahlavi -- adminPermissionsRequired in startup"
    status: covered

  - role: admin
    resource: user
    action: remove
    enforced_at:
      - "/administrace/uzivatele -- adminPermissionsRequired in startup; handleRemove checks ACL isAllowed('user', 'remove')"
    status: covered

  permission_enforcement_summary:
    total_permissions: 9
    enforced: 6
    not_enforced_by_design: 3
    gaps: 0
    notes: "Three permissions (leader: parents.show, parents.edit, parents.sendMail) are defined in the ACL but have no backing routes or implementation. This is because the parents feature was developed and then completely reverted (see 00-git-history.yaml). The ACL definitions were left behind as dead code."

