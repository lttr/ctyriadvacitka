# Deployment configuration for Coolify via Nixpacks
# https://nixpacks.com/docs/configuration/file

[phases.setup]
nixPkgs = ["nodejs_24"]

[phases.install]
cmds = ["corepack enable && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "pnpm db:migrate && node .output/server/index.mjs"
